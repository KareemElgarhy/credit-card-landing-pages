<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Stylized Shield/Card Logo -->
  <rect x="10" y="15" width="40" height="30" rx="4" ry="4" fill="none" stroke="#1d4ed8" stroke-width="3" />
  <line x1="10" y1="25" x2="50" y2="25" stroke="#1d4ed8" stroke-width="3" />
  <rect x="17" y="32" width="10" height="6" rx="1.5" fill="#eab308" />
  <!-- Brand Name -->
  <text x="60" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="900" fill="#0f172a" letter-spacing="-0.5">Premier<tspan fill="#1d4ed8" font-weight="700">Card</tspan></text>
</svg>
